name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          # no `cache: npm` — polyrepo, no committed lockfile; cache errors without one.
      # Resolves @sorb/core from npm (published) — proves leaf builds without the workspace.
      - run: npm install
      - run: find src -name '*.js' -exec node --check {} +
      - run: node build.mjs
